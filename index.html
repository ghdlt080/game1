<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Maze Escape</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header class="game-header">
            <div class="header-left">
                <span class="logo-main">NEON MAZE</span>
                <button id="settings-btn" class="icon-btn">⚙️</button>
            </div>
            <div class="stats">
                <div class="stat-item">LEVEL <span id="current-level">1</span></div>
                <div class="stat-item">TIME <span id="timer">0.0</span>s</div>
                <div class="stat-item">DEATHS <span id="deaths">0</span></div>
            </div>
        </header>

        <main id="game-container">
            <!-- Maze will be injected here -->
            <div id="maze-renderer"></div>
            
            <div id="fake-cursor" class="fake-cursor hidden"></div>
            
            <div id="tutorial-text" class="tutorial-text hidden"></div>

            <div id="game-warning" class="game-warning hidden">
                PLACE CURSOR ON START ZONE
            </div>

            <div id="overlay" class="overlay">
                <div class="overlay-content" id="overlay-view">
                    <!-- Dynamic views: Intro, Settings, Leaderboard, Victory -->
                </div>
            </div>
        </main>

        <footer class="game-footer">
            <p>Avoid the walls. Reach the portal.</p>
        </footer>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
